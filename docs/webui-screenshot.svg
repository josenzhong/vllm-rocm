    <text x="54" y="134" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Simple</text>
    <text x="126" y="134" fill="#9aa7bd" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Advanced</text>
    <text x="220" y="134" fill="#9aa7bd" font-family="Inter, Arial, sans-serif" font-size="15">Simple view: model, download, dtype, memory, and startup.</text>

    <rect x="28" y="174" width="892" height="118" rx="22" fill="#172033" stroke="#26344d"/>
    <text x="52" y="208" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Model</text>
    <rect x="52" y="228" width="692" height="40" rx="14" fill="#0b1020" stroke="#26344d"/>
    <text x="72" y="254" fill="#9aa7bd" font-family="Inter, Arial, sans-serif" font-size="15">Choose local model or enter Hub model ID...</text>
    <rect x="756" y="228" width="100" height="40" rx="20" fill="#243047" stroke="#394763"/>
    <text x="779" y="254" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="14">Scan local</text>

    <rect x="28" y="314" width="892" height="126" rx="22" fill="#172033" stroke="#26344d"/>
    <text x="52" y="348" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Hugging Face search and download</text>
    <rect x="52" y="370" width="650" height="40" rx="14" fill="#0b1020" stroke="#26344d"/>
    <text x="72" y="396" fill="#9aa7bd" font-family="Inter, Arial, sans-serif" font-size="15">Search models...</text>
    <rect x="714" y="370" width="94" height="40" rx="20" fill="#243047" stroke="#394763"/>
    <text x="739" y="396" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="14">Search</text>
    <rect x="52" y="418" width="260" height="1" fill="#26344d"/>

    <g transform="translate(28 468)">
      <rect width="420" height="70" rx="18" fill="#172033" stroke="#26344d"/>
      <text x="20" y="28" fill="#9aa7bd" font-family="Inter, Arial, sans-serif" font-size="14">dtype</text>
      <text x="20" y="52" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">auto ▼</text>
      <rect x="472" width="420" height="70" rx="18" fill="#172033" stroke="#26344d"/>
      <text x="492" y="28" fill="#9aa7bd" font-family="Inter, Arial, sans-serif" font-size="14">GPU memory utilization</text>
      <text x="492" y="52" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">0.90</text>
    </g>

    <g transform="translate(28 560)">
      <rect width="420" height="54" rx="18" fill="#172033" stroke="#26344d"/>
      <text x="20" y="34" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="16">Trust remote code</text>
      <circle cx="382" cy="27" r="12" fill="#0b1020" stroke="#26344d"/>
      <rect x="472" width="420" height="54" rx="18" fill="#172033" stroke="#26344d"/>
      <text x="492" y="34" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="16">Auto-start when container starts</text>
      <circle cx="854" cy="27" r="12" fill="#0b1020" stroke="#26344d"/>
    </g>
