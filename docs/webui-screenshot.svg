    <text x="28" y="44" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Launch profile</text>
    <text x="28" y="74" fill="#9aa7bd" font-family="Inter, Arial, sans-serif" font-size="16">Save settings, preview the command, then start or restart vLLM.</text>
    <rect x="560" y="24" width="76" height="40" rx="20" fill="#172033" stroke="#26344d"/>
    <text x="582" y="50" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="14">Save</text>
    <rect x="646" y="24" width="76" height="40" rx="20" fill="#123524" stroke="#2b8a4f"/>
    <text x="668" y="50" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="14">Start</text>
    <rect x="732" y="24" width="96" height="40" rx="20" fill="#f97316"/>
    <text x="754" y="50" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Restart</text>
