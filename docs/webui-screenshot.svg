  <g transform="translate(1074 368)">
    <rect width="432" height="646" rx="28" fill="#111827" stroke="#26344d"/>
    <text x="26" y="44" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Advanced mode</text>
    <text x="26" y="72" fill="#9aa7bd" font-family="Inter, Arial, sans-serif" font-size="15">All Simple controls remain visible; these extra fields appear below them.</text>
    <rect x="26" y="100" width="178" height="42" rx="21" fill="#172033" stroke="#26344d"/>
    <text x="60" y="127" fill="#9aa7bd" font-family="Inter, Arial, sans-serif" font-size="14">Simple</text>
    <rect x="112" y="104" width="86" height="34" rx="17" fill="#f97316"/>
    <text x="126" y="126" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">Advanced</text>

    <rect x="26" y="166" width="380" height="44" rx="14" fill="#1b2639" stroke="#fb923c"/>
    <text x="46" y="194" fill="#fb923c" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Advanced performance settings</text>

    <g transform="translate(26 232)">
      <rect width="180" height="64" rx="16" fill="#172033" stroke="#26344d"/>
      <text x="16" y="25" fill="#9aa7bd" font-family="Inter, Arial, sans-serif" font-size="13">Tensor parallel</text>
      <text x="16" y="47" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">1</text>
      <rect x="200" width="180" height="64" rx="16" fill="#172033" stroke="#26344d"/>
      <text x="216" y="25" fill="#9aa7bd" font-family="Inter, Arial, sans-serif" font-size="13">Pipeline parallel</text>
      <text x="216" y="47" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">1</text>
    </g>

    <g transform="translate(26 316)">
      <rect width="180" height="64" rx="16" fill="#172033" stroke="#26344d"/>
      <text x="16" y="25" fill="#9aa7bd" font-family="Inter, Arial, sans-serif" font-size="13">KV cache dtype</text>
      <text x="16" y="47" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">fp8 ▼</text>
      <rect x="200" width="180" height="64" rx="16" fill="#172033" stroke="#26344d"/>
      <text x="216" y="25" fill="#9aa7bd" font-family="Inter, Arial, sans-serif" font-size="13">Quantization</text>
      <text x="216" y="47" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">auto ▼</text>
    </g>

    <g transform="translate(26 400)">
      <rect width="180" height="64" rx="16" fill="#172033" stroke="#26344d"/>
      <text x="16" y="25" fill="#9aa7bd" font-family="Inter, Arial, sans-serif" font-size="13">CPU offload GB</text>
      <text x="16" y="47" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">0</text>
      <rect x="200" width="180" height="64" rx="16" fill="#172033" stroke="#26344d"/>
      <text x="216" y="25" fill="#9aa7bd" font-family="Inter, Arial, sans-serif" font-size="13">Swap space GB</text>
      <text x="216" y="47" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">auto</text>
    </g>

    <rect x="26" y="492" width="380" height="74" rx="18" fill="#080d18"/>
    <text x="46" y="522" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="13">Speculative / MTP JSON</text>
    <text x="46" y="548" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="13">Extra raw vLLM args</text>

    <rect x="26" y="590" width="380" height="34" rx="17" fill="#1f2937" stroke="#26344d"/>
    <text x="46" y="612" fill="#fbbf24" font-family="Inter, Arial, sans-serif" font-size="13">Restart required after changing launch parameters</text>
  </g>
</svg>
