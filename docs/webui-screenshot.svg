<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">vLLM ROCm Manager WebUI full page screenshot</title>
  <desc id="desc">Full WebUI mock screenshot showing the manager header, status cards, simple mode, advanced mode, command preview, and runtime logs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1600" height="1120" fill="url(#bg)"/>
  <circle cx="180" cy="110" r="300" fill="#f97316" opacity="0.15"/>
  <circle cx="1450" cy="1060" r="340" fill="#fb923c" opacity="0.08"/>

  <rect x="54" y="44" width="1492" height="1032" rx="34" fill="#111827" stroke="#26344d" filter="url(#shadow)"/>

  <text x="94" y="104" fill="#fb923c" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="3">UNRAID • ROCM • VLLM</text>
  <text x="94" y="162" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800">vLLM ROCm Manager</text>
  <text x="94" y="200" fill="#9aa7bd" font-family="Inter, Arial, sans-serif" font-size="20">Search Hugging Face, download models, tune engine settings, and restart the API from one full WebUI.</text>
  <rect x="1310" y="84" width="86" height="42" rx="21" fill="#172033" stroke="#26344d"/>
  <text x="1331" y="112" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="15">Theme</text>
  <rect x="1408" y="84" width="86" height="42" rx="21" fill="#172033" stroke="#26344d"/>
  <text x="1433" y="112" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="15">API</text>

  <g transform="translate(94 242)">
    <rect width="448" height="94" rx="24" fill="#172033" stroke="#26344d"/>
    <text x="24" y="34" fill="#9aa7bd" font-family="Inter, Arial, sans-serif" font-size="15">Status</text>
    <text x="24" y="68" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Stopped</text>
    <text x="340" y="68" fill="#9aa7bd" font-family="Inter, Arial, sans-serif" font-size="15">PID: -</text>
  </g>
  <g transform="translate(576 242)">
    <rect width="448" height="94" rx="24" fill="#172033" stroke="#26344d"/>
    <text x="24" y="34" fill="#9aa7bd" font-family="Inter, Arial, sans-serif" font-size="15">Model</text>
    <text x="24" y="68" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800">Hub ID or /models path</text>
  </g>
  <g transform="translate(1058 242)">
    <rect width="448" height="94" rx="24" fill="#172033" stroke="#26344d"/>
    <text x="24" y="34" fill="#9aa7bd" font-family="Inter, Arial, sans-serif" font-size="15">OpenAI API</text>
    <text x="24" y="68" fill="#eef2ff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">:8000/v1</text>
  </g>

